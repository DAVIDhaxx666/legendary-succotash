<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>f32j0832r0.jo3.org | Book Library</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Georgia&display=swap');
        
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #2c1f12, #4a2c0b);
            color: #f5e8c8;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        
        .container {
            max-width: 920px;
            margin: 0 auto;
            padding: 60px 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 80px;
        }
        
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.9rem;
            margin: 0;
            text-shadow: 0 5px 20px rgba(0,0,0,0.7);
        }
        
        a {
            color: #f5e8c8;
        }

        .tagline {
            font-size: 1.45rem;
            opacity: 0.9;
            margin-top: 12px;
            font-style: italic;
        }
        
        .search-box {
            background: rgba(255,255,255,0.09);
            backdrop-filter: blur(12px);
            padding: 45px 40px;
            border-radius: 20px;
            margin-bottom: 70px;
            border: 1px solid rgba(212,175,55,0.35);
        }
        
        input[type="text"] {
            width: 100%;
            padding: 18px 25px;
            font-size: 1.25rem;
            border: none;
            border-radius: 50px;
            background: #fff;
            color: #2c1f12;
            margin-bottom: 15px;
        }
        
        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 35px;
        }
        
        .book-card {
            background: #fffcf5;
            color: #3c2f1e;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 12px 35px rgba(0,0,0,0.35);
            transition: all 0.4s ease;
        }
        
        .book-card:hover {
            transform: translateY(-15px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.45);
        }
        
        .book-cover {
            height: 240px;
            background: linear-gradient(#3c2f1e, #6b5235);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f5e8c8;
            font-size: 1.7rem;
            text-align: center;
            padding: 25px;
            font-family: 'Playfair Display', serif;
            line-height: 1.3;
        }
        
        .book-info {
            padding: 28px;
        }
        
        .book-info h3 {
            margin: 0 0 15px 0;
            font-size: 1.65rem;
        }
        
        .book-info p {
            margin: 0 0 22px 0;
            line-height: 1.65;
            opacity: 0.88;
        }
        
        .read-btn {
            background: #8b5a2b;
            color: white;
            padding: 14px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            transition: all 0.3s;
        }
        
        .read-btn:hover {
            background: #d4af37;
            color: #2c1f12;
            transform: scale(1.08);
        }
        
        footer {
            text-align: center;
            margin-top: 90px;
            opacity: 0.75;
            font-size: 0.98rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404 - File Not Found</h1>
        <p>Just go back to the <a href="/">main page<a>.</p>
        <footer>
            <p>Chaos Editions • All stories heavily edited for maximum entertainment</p>
        </footer>
    </div>

    <script>
        function filterBooks() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const cards = document.querySelectorAll('.book-card');
            
            cards.forEach(card => {
                const title = card.getAttribute('data-title').toLowerCase();
                card.style.display = title.includes(query) ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
